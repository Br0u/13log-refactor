<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photos - 13log</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      /* 榛樿涓簂ight妯″紡 */
      :root {
        --bg-color: #fafafa;
        --text-color: #1d1d1d;
        --btn-hover: rgba(0, 0, 0, 0.1);
      }

      /* dark妯″紡瑕嗙洊 */
      body.dark {
        --bg-color: #000;
        --text-color: white;
        --btn-hover: rgba(255, 255, 255, 0.1);
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        background: var(--bg-color);
        color: var(--text-color);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background-color 0.3s ease, color 0.3s ease;
      }

      .gallery-container {
        position: relative;
        padding: 8px;
      }

      #flip-gallery {
        position: relative;
        width: 300px;
        height: 500px;
        text-align: center;
        perspective: 1000px;
      }

      @media (min-width: 600px) {
        #flip-gallery {
          width: 360px;
          height: 600px;
        }
      }

      @media (min-width: 768px) {
        #flip-gallery {
          width: 400px;
          height: 640px;
        }
      }

      #flip-gallery::after {
        content: "";
        position: absolute;
        background-color: black;
        width: 100%;
        height: 4px;
        top: 50%;
        left: 0;
        transform: translateY(-50%);
      }

      #flip-gallery > * {
        position: absolute;
        width: 100%;
        height: 50%;
        overflow: hidden;
        background-size: cover;
        background-repeat: no-repeat;
        background-position: center;
      }

      .top,
      .overlay-top {
        top: 0;
        transform-origin: bottom;
        background-position: top;
      }

      .bottom,
      .overlay-bottom {
        bottom: 0;
        transform-origin: top;
        background-position: bottom;
      }

      .navigation {
        position: absolute;
        top: 100%;
        right: 0;
        margin-top: 8px;
        display: flex;
        gap: 8px;
      }

      .nav-button {
        background: none;
        border: none;
        color: var(--text-color);
        opacity: 0.75;
        cursor: pointer;
        transition: all 0.3s ease;
        padding: 4px;
        width: 28px;
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .nav-button:hover {
        opacity: 1;
        transform: scale(1.25);
      }

      /* 杩斿洖鎸夐挳 */
      .back-btn {
        position: absolute;
        top: 20px;
        right: 20px;
        background: transparent;
        border: none;
        color: var(--text-color);
        padding: 8px 16px;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.3s ease;
        text-decoration: none;
        font-size: 1.2rem;
        z-index: 20;
        opacity: 0.7;
      }

      .back-btn:hover {
        background: var(--btn-hover);
        opacity: 1;
        transform: translateY(-2px);
      }

      /* 鎵规鍒囨崲鍣?- 鍙粦鍔?*/
      .batch-switcher {
        position: absolute;
        top: 20px;
        left: 20px;
        right: 80px; /* 涓鸿繑鍥炴寜閽暀绌洪棿 */
        z-index: 20;
        overflow-x: auto;
        overflow-y: hidden;
        white-space: nowrap;
        padding: 4px 0;
        /* 闅愯棌婊氬姩鏉′絾淇濇寔鍔熻兘 */
        scrollbar-width: none; /* Firefox */
        -ms-overflow-style: none; /* IE/Edge */
      }

      .batch-switcher::-webkit-scrollbar {
        display: none; /* Chrome/Safari */
      }

      .batch-switcher-inner {
        display: inline-flex;
        gap: 8px;
        padding: 0 4px;
      }

      .batch-btn {
        background: transparent;
        border: 1px solid var(--text-color);
        color: var(--text-color);
        padding: 6px 12px;
        border-radius: 16px;
        cursor: pointer;
        transition: all 0.3s ease;
        font-size: 0.8rem;
        opacity: 0.6;
        white-space: nowrap;
        flex-shrink: 0; /* 闃叉鎸夐挳琚帇缂?*/
      }

      .batch-btn.active {
        background: var(--text-color);
        color: var(--bg-color);
        opacity: 1;
      }

      .batch-btn:hover {
        opacity: 1;
        transform: translateY(-1px);
      }

      /* 婊戝姩鎸囩ず鍣?*/
      .batch-switcher::after {
        content: "";
        position: absolute;
        right: 0;
        top: 0;
        bottom: 0;
        width: 20px;
        background: linear-gradient(to right, transparent, var(--bg-color));
        pointer-events: none;
        opacity: 0.8;
      }

      /* 鎵规淇℃伅鏄剧ず */
      .batch-info {
        position: absolute;
        bottom: 20px;
        left: 20px;
        font-size: 0.8rem;
        opacity: 0.7;
        z-index: 20;
      }
    </style>
  </head>
  <body>
    <!-- 杩斿洖鎸夐挳 -->

    <!-- 鎵规鍒囨崲鍣?- 鍙粦鍔?-->

    <!-- 鎵规淇℃伅 -->
    <div class="batch-info" id="batchInfo">Random (1/22)</div>

    <div class="gallery-container">
      <!-- 缈昏浆鐢诲粖 -->
      <div id="flip-gallery" data-title="">
        <div class="top unite"></div>
        <div class="bottom unite"></div>

      <!-- 瀵艰埅鎸夐挳 -->
      <div class="navigation">
        <button type="button" class="nav-button" id="prevBtn" title="Previous">
          <svg
            width="20"

            viewBox="0 0 24 24"

          >
            <polyline points="15,18 9,12 15,6"></polyline>

        </button>
        <button type="button" class="nav-button" id="nextBtn" title="Next">
          <svg
            width="20"

            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <polyline points="9,18 15,12 9,6"></polyline>
          </svg>
        </button>
      </div>
    </div>

    <script>
      // 鐓х墖鎵规鍒嗙被
      const photoBatches = {
        Random: [
          // 摄影作品
          {
            title: "摄影作品 01",
            url: "/images/gallery/05051dcb0t816a84ff98745e8c52828a.jpg",
          },
          {
            title: "摄影作品 02",
            url: "/images/gallery/1b0b6ebfekd712a8c9ddb3a919f6e51b.jpg",
          },
          {
            title: "摄影作品 03",
            url: "/images/gallery/c310c2b15s058b7dad526c25892e071d.jpg",
          },
          {
            title: "摄影作品 04",
            url: "/images/gallery/e432e79a6nb6db538d9df8e8daf47bcd.jpg",
          },
          // 胶片记录
          { title: "胶片记录 01", url: "/images/gallery/R0001640.jpg" },
          { title: "胶片记录 02", url: "/images/gallery/R0002247.jpg" },
          { title: "胶片记录 03", url: "/images/gallery/R0003289.jpg" },
          // 生活瞬间
          { title: "生活瞬间 01", url: "/images/gallery/IMG_1947.jpg" },
          { title: "生活瞬间 02", url: "/images/gallery/IMG_3058.jpg" },
          { title: "生活瞬间 03", url: "/images/gallery/IMG_3545.jpg" },
          { title: "生活瞬间 04", url: "/images/gallery/IMG_3658.jpg" },
          { title: "生活瞬间 05", url: "/images/gallery/IMG_4023.jpg" },
          { title: "生活瞬间 06", url: "/images/gallery/IMG_4256.jpg" },
          { title: "生活瞬间 07", url: "/images/gallery/IMG_4290.jpg" },
          { title: "生活瞬间 08", url: "/images/gallery/IMG_7282.jpg" },
          { title: "生活瞬间 09", url: "/images/gallery/IMG_7285.jpg" },
          { title: "生活瞬间 10", url: "/images/gallery/IMG_8441.jpg" },
          { title: "生活瞬间 11", url: "/images/gallery/IMG_8682.jpg" },
          { title: "生活瞬间 12", url: "/images/gallery/IMG_8790.jpg" },
          { title: "生活瞬间 13", url: "/images/gallery/IMG_8812.jpg" },
          { title: "生活瞬间 14", url: "/images/gallery/IMG_8819.jpg" },
          { title: "生活瞬间 15", url: "/images/gallery/IMG_9132.jpg" },
        ],
        April: [
          { title: "April 01", url: "/images/gallery/gal01/R0001375.jpg" },
          { title: "April 02", url: "/images/gallery/gal01/R0001410.jpg" },
          { title: "April 03", url: "/images/gallery/gal01/R0001504.JPG" },
          { title: "April 04", url: "/images/gallery/gal01/R0001505.JPG" },
          { title: "April 05", url: "/images/gallery/gal01/R0001515.JPG" },
          { title: "April 06", url: "/images/gallery/gal01/R0001601.JPG" },
          { title: "April 07", url: "/images/gallery/gal01/R0001636.JPG" },
          { title: "April 08", url: "/images/gallery/gal01/R0001666.jpg" },
          { title: "April 09", url: "/images/gallery/gal01/R0001732.JPG" },
          { title: "April 10", url: "/images/gallery/gal01/R0001738.jpg" },
          { title: "April 11", url: "/images/gallery/gal01/R0001822.jpg" },
          { title: "April 12", url: "/images/gallery/gal01/R0001829.jpg" },
          { title: "April 13", url: "/images/gallery/gal01/R0001868.jpg" },
          { title: "April 14", url: "/images/gallery/gal01/R0001877.jpg" },
          { title: "April 15", url: "/images/gallery/gal01/R0001939.jpg" },
          { title: "April 16", url: "/images/gallery/gal01/R0001940.jpg" },
          { title: "April 17", url: "/images/gallery/gal01/R0001942.JPG" },
        ],
        Again: [
          { title: "Again 01", url: "/images/gallery/gal02/132218.JPG" },
          { title: "Again 02", url: "/images/gallery/gal02/135776.JPG" },
          { title: "Again 03", url: "/images/gallery/gal02/196598.JPG" },
          { title: "Again 04", url: "/images/gallery/gal02/569.JPG" },
          { title: "Again 05", url: "/images/gallery/gal02/759.JPG" },
          { title: "Again 06", url: "/images/gallery/gal02/806.JPG" },
          { title: "Again 07", url: "/images/gallery/gal02/IMG_0943.jpg" },
          { title: "Again 08", url: "/images/gallery/gal02/IMG_2115.JPG" },
          { title: "Again 09", url: "/images/gallery/gal02/IMG_5242.jpg" },
          { title: "Again 10", url: "/images/gallery/gal02/IMG_5761.jpg" },
          { title: "Again 11", url: "/images/gallery/gal02/IMG_7812.jpg" },
          { title: "Again 12", url: "/images/gallery/gal02/R0003383.JPG" },
        ],
      };

      // 鎵规绠＄悊
      const batchNames = Object.keys(photoBatches);
      let currentBatchIndex = 0;
      let currentBatch = "Random"; // 榛樿鏄剧ずRandom鎵规
      let images = photoBatches[currentBatch];

      console.log(
        `📷 照片画廊加载完成 - 当前批次: ${currentBatch} (${images.length}张)`
      );

      // 鍒囨崲鎵规
      function switchBatch(batchName) {
        currentBatch = batchName;
        currentBatchIndex = batchNames.indexOf(batchName);
        images = photoBatches[currentBatch];
        currentIndex = 0; // 閲嶇疆鍒扮涓€寮犵収鐗?

        // 娓呴櫎褰撳墠鎵规鐨勫姞杞界姸鎬?
        isLoading = false;

        // 鏇存柊UI
        updateBatchButtons();
        updateBatchInfo();
        defineFirstImg();

        // 鍚姩鏂版壒娆＄殑棰勫姞杞?
        setTimeout(() => startPreloadQueue(), 500);

        console.log(`切换到批次: ${currentBatch} (${images.length}张)`);
      }

      // 鏇存柊鎵规鎸夐挳鐘舵€?
      function updateBatchButtons() {
        document.querySelectorAll(".batch-btn").forEach((btn) => {
          btn.classList.remove("active");
          if (btn.dataset.batch === currentBatch) {
            btn.classList.add("active");
            // 鑷姩婊氬姩鍒版椿鍔ㄦ寜閽?
            scrollToActiveButton(btn);
          }
        });
      }

      // 婊氬姩鍒版椿鍔ㄦ寜閽?
      function scrollToActiveButton(activeBtn) {
        const switcher = document.querySelector(".batch-switcher");
        const btnRect = activeBtn.getBoundingClientRect();
        const switcherRect = switcher.getBoundingClientRect();

        // 璁＄畻闇€瑕佹粴鍔ㄧ殑璺濈
        const scrollLeft =
          activeBtn.offsetLeft -
          switcher.offsetWidth / 2 +
          activeBtn.offsetWidth / 2;

        // 骞虫粦婊氬姩
        switcher.scrollTo({
          left: scrollLeft,
          behavior: "smooth",
        });
      }

      // 璁剧疆鎵规鍒囨崲鍣ㄧ殑瑙︽懜婊戝姩
      function setupBatchSwitcherScroll() {
        const switcher = document.querySelector(".batch-switcher");
        let isDown = false;
        let startX;
        let scrollLeft;

        // 榧犳爣浜嬩欢
        switcher.addEventListener("mousedown", (e) => {
          isDown = true;
          switcher.style.cursor = "grabbing";
          startX = e.pageX - switcher.offsetLeft;
          scrollLeft = switcher.scrollLeft;
        });

        switcher.addEventListener("mouseleave", () => {
          isDown = false;
          switcher.style.cursor = "grab";
        });

        switcher.addEventListener("mouseup", () => {
          isDown = false;
          switcher.style.cursor = "grab";
        });

        switcher.addEventListener("mousemove", (e) => {
          if (!isDown) return;
          e.preventDefault();
          const x = e.pageX - switcher.offsetLeft;
          const walk = (x - startX) * 2;
          switcher.scrollLeft = scrollLeft - walk;
        });

        // 瑙︽懜浜嬩欢
        let touchStartX = 0;
        switcher.addEventListener(
          "touchstart",
          (e) => {
            touchStartX = e.touches[0].clientX;
            scrollLeft = switcher.scrollLeft;
          },
          { passive: true }
        );

        switcher.addEventListener(
          "touchmove",
          (e) => {
            const touchX = e.touches[0].clientX;
            const walk = touchStartX - touchX;
            switcher.scrollLeft = scrollLeft + walk;
          },
          { passive: true }
        );

        // 璁剧疆鍒濆鏍峰紡
        switcher.style.cursor = "grab";
      }

      // 鏇存柊鎵规淇℃伅鏄剧ず
      function updateBatchInfo() {
        const info = document.getElementById("batchInfo");
        info.textContent = `${currentBatch} (${currentIndex + 1}/${
          images.length
        })`;
      }

      // 閰嶇疆
      const FLIP_SPEED = 750;
      const flipTiming = { duration: FLIP_SPEED, iterations: 1 };

      // 缈昏浆鍔ㄧ敾鍏抽敭甯?
      const flipAnimationTop = [
        { transform: "rotateX(0)" },
        { transform: "rotateX(-90deg)" },
        { transform: "rotateX(-90deg)" },
      ];
      const flipAnimationBottom = [
        { transform: "rotateX(90deg)" },
        { transform: "rotateX(90deg)" },
        { transform: "rotateX(0)" },
      ];

      // 鍙嶅悜缈昏浆鍔ㄧ敾鍏抽敭甯?
      const flipAnimationTopReverse = [
        { transform: "rotateX(-90deg)" },
        { transform: "rotateX(-90deg)" },
        { transform: "rotateX(0)" },
      ];
      const flipAnimationBottomReverse = [
        { transform: "rotateX(0)" },
        { transform: "rotateX(90deg)" },
        { transform: "rotateX(90deg)" },
      ];

      // 鍏ㄥ眬鍙橀噺
      let currentIndex = 0;
      let container, uniteElements;

      // 鍒濆鍖?
      function init() {
        container = document.getElementById("flip-gallery");
        uniteElements = container.querySelectorAll(".unite");

        defineFirstImg();
        setupEventListeners();
      }

      // 璁剧疆绗竴寮犲浘鐗?
      function defineFirstImg() {
        uniteElements.forEach(setActiveImage);
        updateBatchInfo();
      }

      // 鍥剧墖棰勫姞杞界鐞?
      const imageCache = new Map();
      const loadQueue = [];
      let isLoading = false;
      const PRELOAD_COUNT = 10; // 棰勫姞杞芥暟閲?
      const CONCURRENT_LOADS = 3; // 骞跺彂鍔犺浇鏁伴噺

      // 棰勫姞杞藉浘鐗?
      function preloadImage(imageUrl) {
        return new Promise((resolve, reject) => {
          if (imageCache.has(imageUrl)) {
            resolve(imageCache.get(imageUrl));
            return;
          }

          const img = new Image();
          img.onload = () => {
            imageCache.set(imageUrl, imageUrl);
            console.log(`✅ 图片加载完成: ${imageUrl.split("/").pop()}`);
            resolve(imageUrl);
          };
          img.onerror = () => {
            console.warn(`❌ 图片加载失败: ${imageUrl}`);
            reject(new Error(`Failed to load ${imageUrl}`));
          };
          img.src = imageUrl;
        });
      }

      // 鎵归噺棰勫姞杞藉浘鐗囷紙闃熷垪褰㈠紡锛?
      async function batchPreloadImages(imageUrls, startIndex = 0) {
        const toLoad = imageUrls.slice(startIndex, startIndex + PRELOAD_COUNT);
        console.log(
          `馃攧 寮€濮嬮鍔犺浇 ${toLoad.length} 寮犲浘鐗?(${startIndex + 1}-${
            startIndex + toLoad.length
          })`
        );

        // 鍒嗘壒骞跺彂鍔犺浇
        for (let i = 0; i < toLoad.length; i += CONCURRENT_LOADS) {
          const batch = toLoad.slice(i, i + CONCURRENT_LOADS);
          const promises = batch.map((url) =>
            preloadImage(url).catch((err) => console.warn("预加载失败", err))
          );
          await Promise.allSettled(promises);
        }

        console.log(
          `🎀 预加载完成 ${startIndex + 1}-${startIndex + toLoad.length}`
        );
      }

      // 鍚姩棰勫姞杞介槦鍒?
      function startPreloadQueue() {
        if (isLoading) return;
        isLoading = true;

        const allImages = images.map((img) => img.url);

        // 鍏堥鍔犺浇鍓?0寮?
        batchPreloadImages(allImages, 0).then(() => {
          // 濡傛灉鍥剧墖鎬绘暟瓒呰繃10寮狅紝缁х画鍔犺浇鍓╀綑鐨?
          if (allImages.length > PRELOAD_COUNT) {
            setTimeout(() => {
              batchPreloadImages(allImages, PRELOAD_COUNT).then(() => {
                // 濡傛灉杩樻湁鏇村锛岀户缁姞杞?
                if (allImages.length > PRELOAD_COUNT * 2) {
                  setTimeout(() => {
                    batchPreloadImages(allImages, PRELOAD_COUNT * 2);
                  }, 2000);
                }
              });
            }, 1000);
          }
          isLoading = false;
        });
      }

      // 璁剧疆娲诲姩鍥剧墖锛堜紭鍖栫増鏈?- 鏀寔棰勫姞杞斤級
      function setActiveImage(el) {
        const imageUrl = images[currentIndex].url;

        if (imageCache.has(imageUrl)) {
          // 鍥剧墖宸查鍔犺浇锛岀珛鍗虫樉绀?
          el.style.backgroundImage = `url('${imageUrl}')`;
        } else {
          // 鍥剧墖鏈姞杞斤紝鏄剧ず鍔犺浇鐘舵€佸苟寮傛鍔犺浇
          el.style.backgroundColor = "rgba(128, 128, 128, 0.2)";

          preloadImage(imageUrl)
            .then(() => {
              // 纭繚浠嶇劧鏄綋鍓嶅浘鐗囨墠鏇存柊
              if (images[currentIndex].url === imageUrl) {
                el.style.backgroundImage = `url('${imageUrl}')`;
                el.style.backgroundColor = "transparent";
              }
            })
            .catch((err) => {
              console.error("图片加载失败:", err);
              el.style.backgroundColor = "rgba(255, 0, 0, 0.1)"; // 绾㈣壊琛ㄧず鍔犺浇澶辫触
            });
        }
      }

      // 鏇存柊鐢诲粖
      function updateGallery(nextIndex, isReverse = false) {
        // 纭畾鍔ㄧ敾鏂瑰悜
        const topAnim = isReverse ? flipAnimationTopReverse : flipAnimationTop;
        const bottomAnim = isReverse
          ? flipAnimationBottomReverse
          : flipAnimationBottom;

        // 鎵ц缈昏浆鍔ㄧ敾
        container.querySelector(".overlay-top").animate(topAnim, flipTiming);
        container
          .querySelector(".overlay-bottom")
          .animate(bottomAnim, flipTiming);

        // 鏇存柊鍥剧墖锛堝甫寤惰繜浠ヤ繚鎸佸姩鐢昏繛缁€э級
        uniteElements.forEach((el, idx) => {
          const delay =
            (isReverse && idx !== 1 && idx !== 2) ||
            (!isReverse && (idx === 1 || idx === 2))
              ? FLIP_SPEED - 200
              : 0;

          setTimeout(() => setActiveImage(el), delay);
        });
      }

      // 鏇存柊绱㈠紩
      function updateIndex(increment) {
        const inc = Number(increment);
        const newIndex = (currentIndex + inc + images.length) % images.length;
        const isReverse = inc < 0;
        currentIndex = newIndex;
        updateGallery(newIndex, isReverse);
        updateBatchInfo(); // 鏇存柊鎵规淇℃伅
      }

      // 璁剧疆浜嬩欢鐩戝惉鍣?
      function setupEventListeners() {
        // 鐓х墖瀵艰埅
        document
          .getElementById("prevBtn")
          .addEventListener("click", () => updateIndex(-1));
        document
          .getElementById("nextBtn")
          .addEventListener("click", () => updateIndex(1));

        // 鎵规鍒囨崲
        document.querySelectorAll(".batch-btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            switchBatch(btn.dataset.batch);
          });
        });

        // 閿洏瀵艰埅
        document.addEventListener("keydown", (e) => {
          if (e.key === "ArrowLeft") updateIndex(-1);
          if (e.key === "ArrowRight") updateIndex(1);
          // 鏁板瓧閿垏鎹㈡壒娆?
          if (e.key === "1") switchBatch("Random");
          if (e.key === "2") switchBatch("April");
          if (e.key === "3") switchBatch("Again");
        });

        // 瑙︽懜鎵嬪娍鏀寔
        let touchStartX = 0;
        container.addEventListener("touchstart", (e) => {
          touchStartX = e.touches[0].clientX;
        });

        container.addEventListener("touchend", (e) => {
          const touchEndX = e.changedTouches[0].clientX;
          const diff = touchStartX - touchEndX;

          if (Math.abs(diff) > 50) {
            // 鏈€灏忔粦鍔ㄨ窛绂?
            if (diff > 0) {
              updateIndex(1); // 鍚戝乏婊戝姩锛屼笅涓€寮?
            } else {
              updateIndex(-1); // 鍚戝彸婊戝姩锛屼笂涓€寮?
            }
          }
        });
      }

      // 绠€鍗曠殑涓婚璺熼殢鍔熻兘
      function setupThemeFollow() {
        // 妫€鏌ユ湰鍦板瓨鍌ㄧ殑涓婚鍋忓ソ锛堜笌涓荤珯鍚屾锛?
        const savedTheme = localStorage.getItem("pref-theme");
        const systemPrefersDark = window.matchMedia(
          "(prefers-color-scheme: dark)"
        ).matches;

        // 搴旂敤涓婚锛堜笌PaperMod閫昏緫涓€鑷达級
        if (savedTheme === "dark") {
          document.body.classList.add("dark");
        } else if (savedTheme === "light") {
          document.body.classList.remove("dark");
        } else if (systemPrefersDark) {
          document.body.classList.add("dark");
        }

        console.log(
          "馃摳 Photos椤甸潰涓婚宸插悓姝?",
          savedTheme || (systemPrefersDark ? "dark" : "light")
        );
      }

      // 椤甸潰鍔犺浇瀹屾垚鍚庡垵濮嬪寲
      document.addEventListener("DOMContentLoaded", () => {
        init();
        setupThemeFollow();
        setupBatchSwitcherScroll(); // 璁剧疆鎵规鍒囨崲鍣ㄦ粦鍔?

        // 鍚姩棰勫姞杞介槦鍒?
        setTimeout(() => {
          console.log("🚀 启动图片预加载队列...");
          startPreloadQueue();
        }, 500);
      });
    </script>
  </body>
</html>
